<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Retro Todo List</title>\n    <style>\n        * {\n            margin: 0;\n            padding: 0;\n            box-sizing: border-box;\n        }\n\n        :root {\n            --primary: #00ff41;\n            --secondary: #ff00ff;\n            --tertiary: #00ffff;\n            --dark: #0a0e27;\n            --darker: #050809;\n            --border: #00ff41;\n        }\n\n        body {\n            font-family: 'Courier New', monospace;\n            background-color: var(--darker);\n            color: var(--primary);\n            min-height: 100vh;\n            overflow: hidden;\n        }\n\n        body::before {\n            content: '';\n            position: fixed;\n            top: 0;\n            left: 0;\n            right: 0;\n            bottom: 0;\n            background: repeating-linear-gradient(\n                90deg,\n                transparent,\n                transparent 2px,\n                rgba(0, 255, 65, 0.03) 2px,\n                rgba(0, 255, 65, 0.03) 4px\n            );\n            pointer-events: none;\n            z-index: 100;\n        }\n\n        body::after {\n            content: '';\n            position: fixed;\n            top: 0;\n            left: 0;\n            right: 0;\n            bottom: 0;\n            background: repeating-linear-gradient(\n                0deg,\n                rgba(0, 255, 65, 0.03),\n                rgba(0, 255, 65, 0.03) 1px,\n                transparent 1px,\n                transparent 2px\n            );\n            pointer-events: none;\n            z-index: 100;\n        }\n\n        .container {\n            max-width: 600px;\n            margin: 0 auto;\n            padding: 40px 20px;\n            position: relative;\n            z-index: 1;\n        }\n\n        .header {\n            text-align: center;\n            margin-bottom: 40px;\n        }\n\n        h1 {\n            font-size: 48px;\n            color: var(--primary);\n            text-shadow: 0 0 10px var(--primary);\n            letter-spacing: 2px;\n            margin-bottom: 10px;\n            animation: flicker 0.15s infinite;\n        }\n\n        .subtitle {\n            color: var(--tertiary);\n            font-size: 14px;\n            letter-spacing: 1px;\n        }\n\n        @keyframes flicker {\n            0%, 100% { opacity: 1; }\n            50% { opacity: 0.95; }\n        }\n\n        .input-section {\n            display: flex;\n            gap: 10px;\n            margin-bottom: 30px;\n        }\n\n        input[type=\"text\"] {\n            flex: 1;\n            padding: 12px;\n            border: 2px solid var(--primary);\n            background-color: var(--dark);\n            color: var(--primary);\n            font-family: 'Courier New', monospace;\n            font-size: 14px;\n            text-transform: uppercase;\n        }\n\n        input[type=\"text\"]::placeholder {\n            color: var(--primary);\n            opacity: 0.5;\n        }\n\n        input[type=\"text\"]:focus {\n            outline: none;\n            box-shadow: 0 0 10px var(--primary);\n        }\n\n        button {\n            padding: 12px 24px;\n            border: 2px solid var(--primary);\n            background-color: var(--darker);\n            color: var(--primary);\n            font-family: 'Courier New', monospace;\n            font-size: 14px;\n            font-weight: bold;\n            text-transform: uppercase;\n            cursor: pointer;\n            transition: all 0.2s;\n            letter-spacing: 1px;\n        }\n\n        button:hover {\n            background-color: var(--primary);\n            color: var(--darker);\n            box-shadow: 0 0 10px var(--primary);\n        }\n\n        button:active {\n            transform: scale(0.95);\n        }\n\n        .todo-list {\n            border: 2px solid var(--primary);\n            background-color: var(--dark);\n        }\n\n        .todo-item {\n            display: flex;\n            align-items: center;\n            padding: 15px;\n            border-bottom: 1px dashed var(--primary);\n            gap: 10px;\n            transition: background-color 0.2s;\n        }\n\n        .todo-item:last-child {\n            border-bottom: none;\n        }\n\n        .todo-item:hover {\n            background-color: rgba(0, 255, 65, 0.05);\n        }\n\n        .todo-item.completed {\n            opacity: 0.6;\n        }\n\n        .todo-item.completed .todo-text {\n            text-decoration: line-through;\n            color: var(--secondary);\n        }\n\n        .checkbox {\n            width: 20px;\n            height: 20px;\n            cursor: pointer;\n            accent-color: var(--primary);\n        }\n\n        .todo-text {\n            flex: 1;\n            font-size: 14px;\n            word-break: break-word;\n        }\n\n        .delete-btn {\n            padding: 6px 12px;\n            font-size: 12px;\n            border-color: var(--secondary);\n            color: var(--secondary);\n        }\n\n        .delete-btn:hover {\n            background-color: var(--secondary);\n            color: var(--darker);\n        }\n\n        .stats {\n            margin-top: 30px;\n            padding: 15px;\n            border: 2px solid var(--primary);\n            background-color: var(--dark);\n            text-align: center;\n            font-size: 12px;\n        }\n\n        .stat-row {\n            margin: 5px 0;\n        }\n\n        .stat-number {\n            color: var(--secondary);\n            font-weight: bold;\n            text-shadow: 0 0 5px var(--secondary);\n        }\n\n        .empty-state {\n            text-align: center;\n            padding: 40px 20px;\n            color: var(--primary);\n            opacity: 0.5;\n            font-size: 14px;\n        }\n\n        .clear-all-btn {\n            width: 100%;\n            margin-top: 20px;\n            border-color: var(--secondary);\n            color: var(--secondary);\n        }\n\n        .clear-all-btn:hover {\n            background-color: var(--secondary);\n            color: var(--darker);\n        }\n    </style>\n</head>\n<body>\n    <div class=\"container\">\n        <div class=\"header\">\n            <h1>TODO LIST</h1>\n            <p class=\"subtitle\">~ RETRO TASK MANAGER ~</p>\n        </div>\n\n        <div class=\"input-section\">\n            <input \n                type=\"text\" \n                id=\"todoInput\" \n                placeholder=\"Enter a new task...\"\n                autocomplete=\"off\"\n            >\n            <button onclick=\"addTodo()\">ADD</button>\n        </div>\n\n        <div class=\"todo-list\" id=\"todoList\">\n            <div class=\"empty-state\">No tasks yet. Add one to get started!</div>\n        </div>\n\n        <div class=\"stats\">\n            <div class=\"stat-row\">\n                Total: <span class=\"stat-number\" id=\"totalCount\">0</span>\n            </div>\n            <div class=\"stat-row\">\n                Completed: <span class=\"stat-number\" id=\"completedCount\">0</span>\n            </div>\n            <div class=\"stat-row\">\n                Remaining: <span class=\"stat-number\" id=\"remainingCount\">0</span>\n            </div>\n        </div>\n\n        <button class=\"clear-all-btn\" onclick=\"clearCompleted()\">CLEAR COMPLETED</button>\n    </div>\n\n    <script>\n        // Local Storage Keys\n        const STORAGE_KEY = 'retro-todos';\n\n        // Load todos from local storage\n        function loadTodos() {\n            const stored = localStorage.getItem(STORAGE_KEY);\n            return stored ? JSON.parse(stored) : [];\n        }\n\n        // Save todos to local storage\n        function saveTodos(todos) {\n            localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));\n        }\n\n        // Add a new todo\n        function addTodo() {\n            const input = document.getElementById('todoInput');\n            const text = input.value.trim();\n\n            if (text === '') {\n                alert('Please enter a task!');\n                return;\n            }\n\n            const todos = loadTodos();\n            const newTodo = {\n                id: Date.now(),\n                text: text,\n                completed: false\n            };\n\n            todos.push(newTodo);\n            saveTodos(todos);\n            input.value = '';\n            input.focus();\n            renderTodos();\n        }\n\n        // Toggle todo completion\n        function toggleTodo(id) {\n            const todos = loadTodos();\n            const todo = todos.find(t => t.id === id);\n            if (todo) {\n                todo.completed = !todo.completed;\n                saveTodos(todos);\n                renderTodos();\n            }\n        }\n\n        // Delete a todo\n        function deleteTodo(id) {\n            const todos = loadTodos();\n            const filtered = todos.filter(t => t.id !== id);\n            saveTodos(filtered);\n            renderTodos();\n        }\n\n        // Clear all completed todos\n        function clearCompleted() {\n            const todos = loadTodos();\n            const remaining = todos.filter(t => !t.completed);\n            \n            if (remaining.length === todos.length) {\n                alert('No completed tasks to clear!');\n                return;\n            }\n\n            saveTodos(remaining);\n            renderTodos();\n        }\n\n        // Render todos\n        function renderTodos() {\n            const todos = loadTodos();\n            const todoList = document.getElementById('todoList');\n\n            if (todos.length === 0) {\n                todoList.innerHTML = '<div class=\"empty-state\">No tasks yet. Add one to get started!</div>';\n            } else {\n                todoList.innerHTML = todos.map(todo => `\n                    <div class=\"todo-item ${todo.completed ? 'completed' : ''}\">\n                        <input \n                            type=\"checkbox\" \n                            class=\"checkbox\" \n                            ${todo.completed ? 'checked' : ''}\n                            onchange=\"toggleTodo(${todo.id})\"\n                        >\n                        <span class=\"todo-text\">${escapeHtml(todo.text)}</span>\n                        <button class=\"delete-btn\" onclick=\"deleteTodo(${todo.id})\">DELETE</button>\n                    </div>\n                `).join('');\n            }\n\n            updateStats();\n        }\n\n        // Update statistics\n        function updateStats() {\n            const todos = loadTodos();\n            const completed = todos.filter(t => t.completed).length;\n            const remaining = todos.length - completed;\n\n            document.getElementById('totalCount').textContent = todos.length;\n            document.getElementById('completedCount').textContent = completed;\n            document.getElementById('remainingCount').textContent = remaining;\n        }\n\n        // Escape HTML to prevent XSS\n        function escapeHtml(text) {\n            const div = document.createElement('div');\n            div.textContent = text;\n            return div.innerHTML;\n        }\n\n        // Add Enter key support\n        document.getElementById('todoInput').addEventListener('keypress', function(e) {\n            if (e.key === 'Enter') {\n                addTodo();\n            }\n        });\n\n        // Initial render\n        renderTodos();\n    </script>\n</body>\n</html>\n
